services:
  postgres:
    image: postgres:16-alpine
    container_name: ministages-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: ministages
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d ministages"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ministages-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://test:test@postgres:5432/ministages
      PORT: "3000"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
